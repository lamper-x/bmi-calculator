<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI健康计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 32px; }
        .input-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; font-size: 14px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        input.error { border-color: #ff4757; }
        .unit { position: absolute; right: 16px; color: #999; font-size: 14px; pointer-events: none; }
        .error-msg { color: #ff4757; font-size: 12px; margin-top: 6px; display: none; }
        .error-msg.show { display: block; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .bmi-value { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
        .bmi-category { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
        .bmi-advice { font-size: 14px; line-height: 1.6; opacity: 0.9; }
        .underweight { background: #e3f2fd; color: #1976d2; }
        .normal { background: #e8f5e9; color: #388e3c; }
        .overweight { background: #fff3e0; color: #f57c00; }
        .obese { background: #ffebee; color: #d32f2f; }
        .bmi-scale { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 12px; }
        .scale-title { font-size: 12px; color: #666; margin-bottom: 12px; text-align: center; }
        .scale-bar {
            height: 8px;
            background: linear-gradient(to right, #1976d2 0%, #1976d2 18.5%, #388e3c 18.5%, #388e3c 25%, #f57c00 25%, #f57c00 30%, #d32f2f 30%, #d32f2f 100%);
            border-radius: 4px;
            position: relative;
        }
        .scale-marker {
            position: absolute;
            top: -6px;
            width: 4px;
            height: 20px;
            background: #333;
            border-radius: 2px;
            transform: translateX(-50%);
            transition: left 0.5s ease;
        }
        .scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 BMI健康计算器</h1>
        <p class="subtitle">身体质量指数 (Body Mass Index)</p>
        
        <div class="input-group">
            <label for="height">身高</label>
            <div class="input-wrapper">
                <input type="number" id="height" placeholder="请输入身高" step="0.1" min="50" max="300">
                <span class="unit">cm</span>
            </div>
            <div class="error-msg" id="height-error">请输入有效的身高 (50-300cm)</div>
        </div>
        
        <div class="input-group">
            <label for="weight">体重</label>
            <div class="input-wrapper">
                <input type="number" id="weight" placeholder="请输入体重" step="0.1" min="2" max="500">
                <span class="unit">kg</span>
            </div>
            <div class="error-msg" id="weight-error">请输入有效的体重 (2-500kg)</div>
        </div>
        
        <button onclick="calculateBMI()">计算 BMI</button>
        
        <div class="result" id="result">
            <div class="bmi-value" id="bmi-value">--</div>
            <div class="bmi-category" id="bmi-category">--</div>
            <div class="bmi-advice" id="bmi-advice">--</div>
            
            <div class="bmi-scale">
                <div class="scale-title">BMI 参考标准</div>
                <div class="scale-bar">
                    <div class="scale-marker" id="marker"></div>
                </div>
                <div class="scale-labels">
                    <span>偏瘦</span>
                    <span>正常</span>
                    <span>偏胖</span>
                    <span>肥胖</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('height').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('weight').focus();
        });
        document.getElementById('weight').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateBMI();
        });
        
        function validateInput() {
            let valid = true;
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            
            if (!height || height < 50 || height > 300) {
                document.getElementById('height').classList.add('error');
                document.getElementById('height-error').classList.add('show');
                valid = false;
            } else {
                document.getElementById('height').classList.remove('error');
                document.getElementById('height-error').classList.remove('show');
            }
            
            if (!weight || weight < 2 || weight > 500) {
                document.getElementById('weight').classList.add('error');
                document.getElementById('weight-error').classList.add('show');
                valid = false;
            } else {
                document.getElementById('weight').classList.remove('error');
                document.getElementById('weight-error').classList.remove('show');
            }
            
            return valid ? { height, weight } : null;
        }
        
        function calculateBMI() {
            const data = validateInput();
            if (!data) return;
            
            const { height, weight } = data;
            const heightInM = height / 100;
            const bmi = (weight / (heightInM * heightInM)).toFixed(1);
            
            let category, advice, className, percent;
            
            if (bmi < 18.5) {
                category = '体重偏轻';
                advice = '建议适当增加营养摄入，进行适量力量训练，增强体质。';
                className = 'underweight';
                percent = (bmi / 18.5) * 18.5;
            } else if (bmi < 24) {
                category = '体重正常';
                advice = '恭喜！您的体重在健康范围内，请继续保持均衡饮食和规律运动。';
                className = 'normal';
                percent = 18.5 + ((bmi - 18.5) / 5.5) * 6.5;
            } else if (bmi < 28) {
                category = '超重';
                advice = '建议控制饮食热量，增加有氧运动，每周至少运动150分钟。';
                className = 'overweight';
                percent = 25 + ((bmi - 24) / 4) * 5;
            } else {
                category = '肥胖';
                advice = '为了健康，建议制定减重计划，必要时咨询专业医生或营养师。';
                className = 'obese';
                percent = Math.min(30 + ((bmi - 28) / 10) * 70, 100);
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show ' + className;
            document.getElementById('bmi-value').textContent = bmi;
            document.getElementById('bmi-category').textContent = category;
            document.getElementById('bmi-advice').textContent = advice;
            document.getElementById('marker').style.left = percent + '%';
        }
    </script>
</body>

</html>
